<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hierarchical Spider (Drilldown)</title>
<style>

/* 右下角小提示符号 */
.node .click-hint {
  fill:#888;
  font-size:12px;
  pointer-events:none; /* 不挡鼠标事件 */
}

/* hover 高亮效果 */
.node.has-panel rect {
  transition: stroke-width 0.2s, stroke 0.2s;
}
.node.has-panel:hover rect {
  stroke:#555;
  stroke-width:2;
}

/* 简单 tooltip */
.tooltip {
  position: absolute;
  background: rgba(0,0,0,0.75);
  color: #fff;
  font-size: 12px;
  padding: 3px 6px;
  border-radius: 4px;
  pointer-events: none;
  white-space: nowrap;
  z-index: 10000;
  display: none;
}


/* 弹窗底部备注样式 */
.callout .note{
  margin-top: 10px;
  font-size: 10px;          /* 与表格同号；想更小可 9px */
  color: #666;
  line-height: 1.35;
}
.callout .note ol{
  margin: 6px 0 0 18px;     /* 缩进有序列表 */
  padding: 0;
}
.callout .note li{ margin: 2px 0; }

  :root{
    --c1:#3b6fb6; --c2:#6aa84f; --c3:#f39c12; --c4:#a569bd;
  }
  html,body{height:100%}
  body{margin:0; display:flex; flex-direction:column; background:#fff; color:#222;
    font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,"PingFang SC","Microsoft YaHei",sans-serif;}
  header{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 14px;border-bottom:1px solid #eee}
  .title{font-size:18px;font-weight:600}
  .actions{display:flex;gap:8px}
  button{padding:6px 10px;border:1px solid #ddd;background:#fff;border-radius:8px;cursor:pointer}
  button:hover{background:#f7f7f7}

  .hint{display:none;padding:6px 14px;border-bottom:1px dashed #eee;color:#666;font-size:13px;background:#fcfcfc}
  .canvas{flex:1 1 auto; min-height:360px; position:relative}
  svg{width:100%; height:100%; display:block}

  .node text{fill:#222; font-size:14px; dominant-baseline:middle; text-anchor:middle; pointer-events:none}
  .node.center text{fill:#fff; font-weight:600}
  .node rect{rx:10; ry:10; stroke-width:1}
  .layer.links{pointer-events:none}
  .link{stroke:#cfcfcf; stroke-width:1.5; fill:none}
  @media (max-width:520px){ .node text{font-size:12px} }

  .callout rect{rx:10; ry:10}
  .callout .box{font-size:13px; line-height:1.35; padding:6px 8px 8px 8px; overflow:auto;}
  .callout h4{ margin:4px 0 8px 0; font-size:14px; }
  .callout table{width:100%; border-collapse:collapse; font-size:13px}
  .callout td{border-top:1px solid #eee; padding:6px 6px; vertical-align:top}

/* 让表格在 foreignObject 的滚动容器内支持 sticky */
.callout .box {
  overflow: auto;                  /* 作为 sticky 的滚动容器 */
  -webkit-overflow-scrolling: touch; /* iOS 更顺滑（可选） */
}

/* sticky 在某些浏览器对 collapse 支持不好，改用 separate 更稳 */
.callout table {
  border-collapse: separate;
  border-spacing: 0;
  min-width: 900px;  /* ← 新增，数字可改 980px/1100px 等 */
}

/* 表头：上下滚动时固定在顶部 */
.callout thead th {
  position: sticky;
  top: 0;
  z-index: 3;                      /* 盖住内容区 */
  background: #fff;                /* 需不透明背景 */
  box-shadow: 0 1px 0 #eee;        /* 底部分隔线（可选） */
}


/* 表头：上下滚动时固定在顶部，背景保持白色（与其他表头一致） */
.callout thead th {
  position: sticky;
  top: 0;
  z-index: 3;
  background: #fff;        /* 给表头统一白底 */
  box-shadow: 0 1px 0 #eee;
}

/* 重要：不要再给表头第一列设置 left:0，
   这样 Dimension 不会被“横向冻结”，会跟随水平滚动 */


/* 弹窗正文/表格整体小一号 */
.callout .box { font-size:10px; }
.callout table { font-size:10px; }

/* 标题也可以略小一点（可选）*/
.callout h4 { font-size:11px; }

/* 也可以把单元格内边距再压一丢丢（可选）*/
.callout td { padding:4px 6px; }


/* --- 分组底色（按分组轮换） --- */
.callout table tr.cat-0 { background: #f7fbff; } /* 淡蓝 */
.callout table tr.cat-1 { background: #fff8f2; } /* 淡橙 */
.callout table tr.cat-2 { background: #f8fff5; } /* 淡绿 */
.callout table tr.cat-3 { background: #fbf7ff; } /* 淡紫 */

/* 只加粗表头的 Dimension */
.callout thead th:first-child {
  font-weight: 600;
}

/* 保证 Dimension 列不换行 */
/* 只让 GP 表的 Dimension 列可换行，避免太宽 */
.callout table.gp td:first-child {
  white-space: normal;
  word-break: break-word;
}

/* Topics 表：不固定整表宽度；让 Data 列自动吃剩余空间 */
.callout table.topics {
  border-collapse: separate;
  border-spacing: 0;
  min-width: auto;      /* ← 覆盖全局 900px，Topics 不固定整体宽度 */
  table-layout: auto;
}

/* --- 前三列（Category / Cluster / Dimension）--- */
.callout table.topics td:nth-child(1),
.callout table.topics th:nth-child(1)  { width: 120px; }   /* Category（合并表头） */

.callout table.topics td:nth-child(2),
.callout table.topics th:nth-child(2)  { width: 140px; }   /* Cluster */

.callout table.topics td:nth-child(3),
.callout table.topics th:nth-child(3)  {
  width: 200px;                         /* Dimension */
  white-space: normal;
  word-break: break-word;
}

/* --- 中间若干“小列”尽量紧凑，避免把空间挤走 --- */
.callout table.topics td:nth-child(4), /* Study ID */
.callout table.topics th:nth-child(4)  { width: 80px; white-space: nowrap; }

.callout table.topics td:nth-child(5), /* Data Type */
.callout table.topics th:nth-child(5)  { width: 72px; white-space: nowrap; }

.callout table.topics td:nth-child(6), /* Data Perspective */
.callout table.topics th:nth-child(6)  { width: 120px; white-space: nowrap; }

.callout table.topics td:nth-child(7), /* Data Focus */
.callout table.topics th:nth-child(7)  { width: 120px; white-space: nowrap; }

.callout table.topics td:nth-child(8), /* Stage */
.callout table.topics th:nth-child(8)  { width: 140px; white-space: nowrap; }

/* --- Data 列：不设固定宽度，让它和其他页面一样自然变宽 --- */
.callout table.topics td:nth-child(9),
.callout table.topics th:nth-child(9)  {
  width: auto;               /* 关键：让 Data 列自动占据剩余空间 */
  white-space: normal;
  word-break: break-word;
}

/* 分组底色保持不变（cat-0..3） */
.callout table.topics tr.cat-0 { background: #f7fbff; }
.callout table.topics tr.cat-1 { background: #fff8f2; }
.callout table.topics tr.cat-2 { background: #f8fff5; }
.callout table.topics tr.cat-3 { background: #fbf7ff; }



/* --- 右下角徽章（固定在窗口角落） --- */
.badge-fixed {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 120px;     /* 徽章显示宽度，自行调整 */
  z-index: 9999;    /* 确保在最上层 */
  opacity: 0.95;    /* 略微透明，可改为 1 */
  pointer-events: none; /* 不挡住页面点击；若想可点击就改成 auto 并外包 <a> */
}

/* Intro overlay: prevent page scrolling while the overlay is visible */
body.no-scroll { overflow: hidden; }

/* (optional) Make links in the intro look tidy if you add any later */
#intro-overlay a { color: inherit; text-decoration: underline; }

/* ===== Intro overlay（指导弹窗）===== */
#intro-overlay{
  position: fixed; inset:0; z-index: 99998;
  display: none; /* 进页后JS决定是否显示 */
  align-items: center; justify-content: center;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(2px);
}
#intro-card{
  width: min(900px, 92vw);
  max-height: min(88vh, 820px);
  background: #fff; color:#222;
  border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.2);
  display:flex; flex-direction:column; overflow:hidden;
}
#intro-head{
  padding:14px 16px; border-bottom:1px solid #eee;
  font-weight:600; font-size:16px; display:flex; align-items:center; gap:10px;
}
#intro-body{
  padding: 14px 16px; display:flex; gap:16px; align-items:flex-start;
}
#intro-steps{
  flex: 0 0 300px; font-size:13px; line-height:1.55; color:#555;
}
#intro-live{
  flex: 1 1 auto; min-height: 360px;
  border: 1px solid #eee; border-radius: 12px; position: relative;
  background: #fafafa;
}
#intro-foot{
  border-top:1px solid #eee; padding:10px 12px;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
#intro-start-btn{
  padding:8px 14px; background:#111; color:#fff; border:none; border-radius:9px; cursor:pointer;
}
#intro-start-btn:hover{ background:#000; }

/* “虚拟鼠标”光标 */
#demo-cursor{
  position:absolute; width:16px; height:16px; border-radius:50%;
  background:#111; box-shadow:0 0 0 6px rgba(17,17,17,.12);
  pointer-events:none; transform:translate(-50%,-50%); opacity:.95;
}

/* 说明小标签（跟随步骤变化，可选） */
#demo-caption{
  position:absolute; left:12px; bottom:12px;
  background:rgba(0,0,0,.75); color:#fff; font-size:12px; padding:6px 8px; border-radius:8px;
  max-width: 70%; pointer-events:none;
}

/* 弹窗出现时禁止页面滚动 */
body.no-scroll{ overflow:hidden; }

/* ===== 演示点击高亮（小窗）===== */
#intro-live .click-ping{
  position: absolute;          /* 使用视口坐标，配合 getBoundingClientRect */
  width: 14px; height: 14px; border-radius: 50%;
  background:#111; box-shadow:0 0 0 8px rgba(17,17,17,.12);
  transform: translate(-50%,-50%);
  pointer-events: none;
  z-index: 100001;          /* 高于遮罩与 SVG */
  animation: demo-pulse 450ms ease-out forwards;
}
#intro-live .click-ping::after{
  content:"";
  position:absolute; left:50%; top:50%;
  width:14px; height:14px; margin:-7px; border-radius:50%;
  border:2px solid rgba(17,17,17,.6);
  transform: translate(-50%,-50%);
  animation: demo-ripple 450ms ease-out forwards;
}
@keyframes demo-pulse{
  0%   { transform: translate(-50%,-50%) scale(0.8); opacity: 0.95; }
  100% { transform: translate(-50%,-50%) scale(1.0); opacity: 0.85; }
}
@keyframes demo-ripple{
  0%   { transform: translate(-50%,-50%) scale(1.0); opacity: 0.7; }
  100% { transform: translate(-50%,-50%) scale(3.2); opacity: 0; }
}

/* 被点击标签在 demoSvg 中的高亮边框 */
#demoSvg .demo-hi rect{
  stroke:#111 !important;
  stroke-width: 2.5 !important;
  filter: drop-shadow(0 0 3px rgba(0,0,0,.25));
}

/* --- Intro overlay：改为“上方大演示 + 下方两行说明”布局 --- */
#intro-body{
  padding: 14px 16px;
  display: flex;
  flex-direction: column;   /* 纵向堆叠：上=演示窗，下=说明文字 */
  gap: 12px;
  align-items: stretch;     /* 让演示窗占满横向 */
  flex: 1 1 auto;           /* 撑开可用高度 */
}

#intro-live{
  flex: 1 1 auto;           /* 占据几乎所有面积 */
  min-height: 420px;        /* 小屏兜底高度 */
  height: auto;             /* 随容器自适应 */
  border: 1px solid #eee;
  border-radius: 12px;
  position: relative;
  background: #fafafa;
}

/* 演示区域里的 demoSvg 仍保持内边距和圆角阴影 */
#intro-live > svg#demoSvg{
  position:absolute; inset:12px;
  width:calc(100% - 24px); height:calc(100% - 24px);
  background:#fff; border-radius:10px;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.05);
}

/* 新增：底部两行说明 */
#intro-notes{
  font-size: 13px; line-height: 1.6; color:#555;
  padding: 2px 2px 0;
}
#intro-notes p{ margin: 0; }

</style>
</head>


<body>


  <header>
    <div class="title" id="title">Communication</div>
    <div class="actions">
      <button id="btnBack" style="display:none">← Back</button>
      <button id="btnHome">⟲ Home</button>
    </div>
  </header>

<!-- ===== Intro overlay（指导弹窗） ===== -->
<div id="intro-overlay" aria-modal="true" role="dialog">
  <div id="intro-card">
    <div id="intro-head">How to explore this spider diagram</div>
<div id="intro-body">
  <!-- 大号动态演示窗口（几乎占满中间区域） -->
  <div id="intro-live">
    <svg id="demoSvg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet"
         style="position:absolute; inset:12px; width:calc(100% - 24px); height:calc(100% - 24px);
                background:#fff; border-radius:10px; box-shadow: inset 0 0 0 1px rgba(0,0,0,.05);"></svg>

    <!-- 虚拟鼠标与字幕（保持不变） -->
    <div id="demo-cursor" aria-hidden="true"></div>
    <div id="demo-caption" aria-hidden="true">Demo is playing…</div>
  </div>

  <!-- 演示窗口正下方的两段指导文字（仍在指导弹窗内） -->
  <div id="intro-notes">
    <p>1. Click any lower-level label to <em>zoom in</em>，click the higher-level label at the center to <em>zoom out</em>。</p>
    <p>2. Click a third-level label to show or hide its Supporting Data panel.</p>
  </div>
</div>


    <div id="intro-foot">
      <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:#666;">
        <input id="intro-dontshow" type="checkbox"> Don’t show this tips next time
      </label>
      <button id="intro-start-btn">Start exploring</button>
    </div>
  </div>
</div>

 <script>
  // —— 放在 const DATA 之前 ——

// —— 放在 const DATA 之前 ——（紧跟在 makeTable 之后）
// Topics 专用：三级分组（Category → Cluster → Dimension）
// Topics 专用：三级分组（Category → Cluster → Dimension）+ 结构重整 & 去重 & 合并单元格
// Topics 专用：三级分组（Category → Cluster → Dimension）+ 结构重整 & 正确的分组rowspan
function makeTopicsTable(rows){
  // 深拷贝，避免改动原始数据
  const data = rows.map(r => ({...r}));

  /* === 结构规则 === */
  // Practical：把 Financial / Organ donation / Wills 收编到 After death arrangement（作为 Dimension）
  const absorbToAfterDeath = new Set(["Financial","Organ donation","Wills"]);
  data.forEach(r=>{
    if (r.Category === "Practical" && absorbToAfterDeath.has(r.Cluster)) {
      const old = r.Cluster;
      r.Cluster   = "After death arrangement";
      r.Dimension = r.Dimension || old; // 保持细项名当作 Dimension
    }
  });

  // Emotional：这些二级标题“无三级”→ 合并 Cluster+Dimension
  const emotionalClusterOnly = new Set([
    "Feeling about own death",
    "Love",
    "Emotional connection",
    "Feeling about the loss",
    "Necessary to talk emotional topics"
  ]);
  data.forEach(r=>{
    if (r.Category === "Emotional" && emotionalClusterOnly.has(r.Cluster)) {
      if (!r.Dimension || r.Dimension === r.Cluster) r.Dimension = ""; // 视为无三级
    }
  });

  // “All avoid, but prefer factual issue”：单独一级 Category
  data.forEach(r=>{
    if (r.Category === "Emotional" && r.Cluster === "All avoid, but prefer factual issue") {
      r.Category  = "All avoid, but prefer factual issue";
      r.Cluster   = "";
      r.Dimension = "";
    }
  });

  // ⚠️ 不做 (Category,Cluster,Dimension) 级别的去重！保留每条研究记录
  // 若真有完全重复的“同一行”，可以只在这里去除“完全相同的整行”
  // （可选）：
  // const seen = new Set(); data = data.filter(r=>{
  //   const key = JSON.stringify(r); if (seen.has(key)) return false; seen.add(key); return true;
  // });

  /* === 分组：Category → Cluster === */
  const catOrder = [];
  const byCat = new Map();
  data.forEach(r=>{
    const c = r.Category || "(Uncategorized)";
    if (!byCat.has(c)) { byCat.set(c, []); catOrder.push(c); }
    byCat.get(c).push(r);
  });

  function groupByCluster(list){
    const order = [];
    const map = new Map();
    list.forEach(r=>{
      const k = r.Cluster || ""; // 为空表示只有一级
      if (!map.has(k)) { map.set(k, []); order.push(k); }
      map.get(k).push(r);
    });
    return {order, map};
  }

  // 表头
  const thead = `<thead>
    <tr>
      <th colspan="3">Dimenson</th>
      <th>Study ID</th>
      <th>Data Type</th>
      <th>Data Perspective</th>
      <th>Data Focus</th>
      <th>Stage of Life/Illness</th>
      <th>Data</th>
    </tr>
  </thead>`;

  let tbody = "";

  catOrder.forEach((cat, gi)=>{
    const list = byCat.get(cat) || [];
    const {order: cluOrder, map: byClu} = groupByCluster(list);

    // 先计算本 Category 的总行数（用于 Category 的 rowspan）
    let catRowCount = 0;
    const prepared = cluOrder.map(clu=>{
      const rowsInCluster = (byClu.get(clu) || []).slice();

      // 分成两类：
      // A) 有 Dimension（且 Dimension != Cluster）→ “按 Dimension 分组”，每个分组下有多条研究
      // B) 无 Dimension → 只合并 Cluster+Dimension 两列
      const withDims = rowsInCluster.filter(r => (r.Dimension && r.Dimension !== r.Cluster));
      const noDims   = rowsInCluster.filter(r => (!r.Dimension || r.Dimension === r.Cluster));

      // A) 按 Dimension 分组（保持首次出现顺序）
      const dimOrder = [];
      const byDim = new Map();
      withDims.forEach(r=>{
        const dname = r.Dimension;
        if (!byDim.has(dname)) { byDim.set(dname, []); dimOrder.push(dname); }
        byDim.get(dname).push(r);
      });

      // cluster 的总行数 = 各维度分组内的条目数之和 + 无三级的条目数
      const rowsPlanned = dimOrder.reduce((s,d)=> s + (byDim.get(d)?.length||0), 0) + noDims.length;

      catRowCount += rowsPlanned;
      return {clu, dimOrder, byDim, noDims, rowsPlanned};
    });

    // 真正渲染
    let catPrinted = false;
    prepared.forEach(({clu, dimOrder, byDim, noDims, rowsPlanned})=>{
      let cluPrinted = false;

      // A) 先渲染“有 Dimension”的分组
      dimOrder.forEach(dim=>{
        const list = byDim.get(dim) || [];
        list.forEach((r, idxInDim)=>{
          const cls = `cat-${gi % 4}`;
          tbody += `<tr class="${cls}">`;

          // Category：整块只打一次
          if (!catPrinted) {
            tbody += `<td rowspan="${catRowCount}">${cat}</td>`;
            catPrinted = true;
          }
          // Cluster：该 cluster 只打一次（跨整个 cluster）
          if (!cluPrinted) {
            tbody += `<td rowspan="${rowsPlanned}">${clu || ""}</td>`;
            cluPrinted = true;
          }
          // Dimension：该维度分组首行打印，并跨该分组条目数
          if (idxInDim === 0) {
            tbody += `<td rowspan="${list.length}">${dim || ""}</td>`;
          }

          // 余下列
          tbody += `
            <td>${r.StudyID||""}</td>
            <td>${r.DataType||""}</td>
            <td>${r.DataPerspective||""}</td>
            <td>${r.DataFocus||""}</td>
            <td>${r.Stage||""}</td>
            <td>${r.Data||""}</td>
          `;
          tbody += `</tr>`;
        });
      });

// B) 渲染“无三级”的条目
noDims.forEach((r, idx)=>{
  const cls = `cat-${gi % 4}`;
  tbody += `<tr class="${cls}">`;

  // 情况1：正常的 Emotional 子类（Feeling about own death 等）
  if (cat !== "All avoid, but prefer factual issue") {
    if (!catPrinted) {
      tbody += `<td rowspan="${catRowCount}">${cat}</td>`;
      catPrinted = true;
    }
    if (!cluPrinted) {
      tbody += `<td colspan="2" rowspan="${rowsPlanned}">${clu || ""}</td>`;
      cluPrinted = true;
    }
  }
  // 情况2：All avoid, but prefer factual issue → 合并前三列
  else {
    if (!catPrinted) {
      tbody += `<td colspan="3" rowspan="${catRowCount}">${cat}</td>`;
      catPrinted = true;
      cluPrinted = true; // 避免重复打印
    }
  }

  tbody += `
    <td>${r.StudyID||""}</td>
    <td>${r.DataType||""}</td>
    <td>${r.DataPerspective||""}</td>
    <td>${r.DataFocus||""}</td>
    <td>${r.Stage||""}</td>
    <td>${r.Data||""}</td>
  `;
  tbody += `</tr>`;
});


      // 极端空 cluster 占位（通常不会发生）
      if (rowsPlanned === 0) {
        const cls = `cat-${gi % 4}`;
        tbody += `<tr class="${cls}">`;
        if (!catPrinted) {
          tbody += `<td rowspan="1">${cat}</td>`;
          catPrinted = true;
        }
        tbody += `<td colspan="2" rowspan="1">${clu || ""}</td>`;
        tbody += `<td colspan="6"></td>`;
        tbody += `</tr>`;
      }
    });
  });

  return `<table class="topics">${thead}<tbody>${tbody}</tbody></table>`;
}

  function makeTable(rows){
  const headers = [
    "Dimension","Study ID","Data Type","Data Perspective",
    "Data Focus","Stage of Life/Illness","Data"
  ];

  // 维持原始出现顺序的分组（按 Dimension）
  const order = [];
  const groups = new Map();
  rows.forEach(r=>{
    const key = r.Dimension|| "(Uncategorized)";
    if(!groups.has(key)){ groups.set(key, []); order.push(key); }
    groups.get(key).push(r);
  });

  const thead = `<thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead>`;

  let tbody = "";
  order.forEach((cat, gi)=>{
    const gRows = groups.get(cat);
    gRows.forEach((r, idx)=>{
      // 分组着色类名（4色循环：cat-0/1/2/3）
      const cls = `cat-${gi % 4}`;
      tbody += `<tr class="${cls}">`;
      // 仅在该组第一行输出一次 Dimension，并用 rowspan 合并
      if(idx === 0){
        tbody += `<td rowspan="${gRows.length}">${cat}</td>`;
      }
      // 其余列照常输出
      tbody += `
        <td>${r.StudyID||""}</td>
        <td>${r.DataType||""}</td>
        <td>${r.DataPerspective||""}</td>
        <td>${r.DataFocus||""}</td>
        <td>${r.Stage||""}</td>
        <td>${r.Data||""}</td>
      `;
      tbody += `</tr>`;
    });
  });

  return `<table>${thead}<tbody>${tbody}</tbody></table>`;
}

// 平滑把某个屏幕坐标(sx,sy)缩放并移到画面中心，再回调
function smoothZoomTo(sx, sy, zoom, done){
  const vb = svg.node().viewBox.baseVal;
  const cx = vb.width/2, cy = vb.height/2;
  const dx = cx - zoom * sx;
  const dy = cy - zoom * sy;

  // 给整个 gRoot 做过渡
  gRoot.transition()
    .duration(500)               // 时长可调
    .ease(d3.easeCubicInOut)     // 缓动可调
    .attr("transform", `translate(${dx},${dy}) scale(${zoom})`)
    .on("end", () => {
      gRoot.attr("transform", null); // 复位
      if (done) done();
    });
}

// 平滑把整页直接“滑到左侧停靠”的目标变换（与 drawDetail 完全一致），再回调
function smoothDockToLeft(centerId, done){
  const vb = svg.node().viewBox.baseVal;
  const cx = vb.width/2, cy = vb.height/2;

  const scale = DETAIL_LAYOUT_SCALE;
  const biasFrac = (LEFT_BIAS_BY_PAGE[centerId] ?? LEFT_BIAS_FRACTION);
  const biasPx   = -(vb.width * biasFrac) / scale;

  gRoot.transition()
    .duration(450)                 // 与放大页动画时长一致（可 400–600ms 微调）
    .ease(d3.easeCubicInOut)
    .attr("transform", `translate(${cx + biasPx},${cy}) scale(${scale})`)
    .on("end", () => {
      gRoot.attr("transform", null);      // 复位以便重绘
      if (done) done();
    });
}

// 从首页：让被点击的第三级标签 (sx,sy) 一边放大一边“对齐”到下一页左侧停靠后的中心位置
function smoothZoomDockToNode(sx, sy, centerId, homeScale, done){
  const vb = svg.node().viewBox.baseVal;
  const cx = vb.width/2, cy = vb.height/2;

  // 目标（下一页）的有效缩放 = DETAIL_LAYOUT_SCALE
  // 首页当前 g 的缩放 = homeScale
  // 整体为了无缝衔接，应让 gRoot 的缩放 = DETAIL_LAYOUT_SCALE / homeScale
  const destScale = DETAIL_LAYOUT_SCALE / homeScale;

  // 下一页左侧停靠时，中心(0,0)在画布上的目标位置（x 越小越靠左）
  const biasFrac = (LEFT_BIAS_BY_PAGE[centerId] ?? LEFT_BIAS_FRACTION);
  const destX = cx - (vb.width * biasFrac) / DETAIL_LAYOUT_SCALE; // ← 与 drawDetail 同公式
  const destY = cy;

  // 让“当前屏幕坐标” (sx,sy) 在这次过渡后正好落到 (destX,destY)
  const dx = destX - destScale * sx;
  const dy = destY - destScale * sy;

  gRoot.transition()
    .duration(500)                 // 时长可调 400–600
    .ease(d3.easeCubicInOut)
    .attr("transform", `translate(${dx},${dy}) scale(${destScale})`)
    .on("end", () => {
      gRoot.attr("transform", null); // 复位以便重绘
      if (done) done();
    });
}

    }),
    drawInPlace: () => withCtx(ctx, () => draw(state.current || DATA)),
    // 打开/关闭某子节点的面板（按 id 包含匹配）
    togglePanelById: (frag, open=true) => withCtx(ctx, ()=>{
      const center = state.current; if (!center) return;
      const kids = (center.children||[]);
      const target = kids.find(k => (k.id||'').toLowerCase().includes(frag.toLowerCase()));
      if (!target) return;
      if (open) { state.openPanels.add(target); state.focusSolo = target; }
      else      { state.openPanels.delete(target); state.focusSolo = null; }
      draw(center);
    }),
 findNodeCenterByText: (txt, opts={}) => {
      const exact = !!opts.exact;
      const centerOnly = !!opts.centerOnly;
      const leafOnly = !!opts.leafOnly;
      const sel = centerOnly ? 'g.node.center'
               : leafOnly   ? 'g.node.leaf'
               : 'g.node';
      const groupNodes = ctx.svg.selectAll(sel).nodes();
      const pick = (nodes, predicate) => {
        for (const el of nodes) {
          const t = el.querySelector('text');
          if (!t) continue;
          const content = (t.textContent || '')
            .replace(/\s+/g,' ')
            .trim()
            .toLowerCase();
          if (predicate(content)) {
            const bb = el.getBoundingClientRect();
            return { x:(bb.left+bb.right)/2, y:(bb.top+bb.bottom)/2, el };
          }
        }
        return null;
      };
      const q = txt.toLowerCase();
      let found = exact ? pick(groupNodes, c => c === q) : null;
      if (!found) found = pick(groupNodes, c => c.includes(q));
      return found;
    }
  };                   // ←←← 收口：先结束 return 的对象
}                      // ←←← 再结束函数本体

// —— 在 Intro 弹窗里启动“只跑在 demoSvg 上”的自动演示 ——
// 替换你之前的自动演示：把 playOneLoop 里所有 goHome/goDeeper/goBack 换成 demoX.home/deeper/back。
(function(){
  const overlay  = document.getElementById('intro-overlay');
  const startBtn = document.getElementById('intro-start-btn');
  const dontShow = document.getElementById('intro-dontshow');
  const cursor   = document.getElementById('demo-cursor');
  const KEY      = 'hs-intro-hide';
  const demoSvg  = document.getElementById('demoSvg');

  // 上下文 + API
  const ctx     = makeCtx(demoSvg);
  const demoX   = demoAPI(ctx);

  // 小窗里先渲染首页一次
  demoX.home();

  // —— 虚拟鼠标移动（只在小窗里移动）——
function moveCursorTo(vx, vy, ms=600){
  return new Promise(res=>{
    const liveRect = document.getElementById('intro-live').getBoundingClientRect();
    const x = vx - liveRect.left;   // 目标点：容器坐标
    const y = vy - liveRect.top;

    const curRect = cursor.getBoundingClientRect();
    const x0 = curRect.left - liveRect.left + curRect.width/2;  // 当前点：容器坐标
    const y0 = curRect.top  - liveRect.top  + curRect.height/2;

    const t0 = performance.now();
    function step(t){
      const p = Math.min(1,(t-t0)/ms);
      const ease = p<.5 ? 4*p*p*p : 1 - Math.pow(-2*p + 2, 3)/2;
      cursor.style.left = (x0 + (x-x0)*ease) + 'px';
      cursor.style.top  = (y0 + (y-y0)*ease) + 'px';
      if(p<1) requestAnimationFrame(step); else res();
    }
    requestAnimationFrame(step);
  });
}


function pingAt(vx, vy, life = 700){
  const live = document.getElementById('intro-live');
  const rect = live.getBoundingClientRect();     // 容器在视口中的位置
  const dot = document.createElement('div');
  dot.className = 'click-ping';
  dot.style.left = (vx - rect.left) + 'px';      // 视口坐标 → 容器坐标
  dot.style.top  = (vy - rect.top)  + 'px';
  live.appendChild(dot);
  setTimeout(()=> dot.remove(), life);
}


  // —— 暂时给一个 demoSvg 里的 g.node 打高亮边框 —— 
  function highlightNode(el, hold=900){
    try{
      const sel = d3.select(el);
      sel.classed('demo-hi', true);
      setTimeout(()=> sel.classed('demo-hi', false), hold);
    }catch(_){}
  }

async function clickLabel(label, action, opts={}){
  const pos = demoX.findNodeCenterByText(label, opts);
  if (!pos) return;

  await moveCursorTo(pos.x, pos.y, 600);

  // 视觉反馈：高亮 + 波纹（用你前面写好的两个函数）
const RIPPLE_MS = 450;     // 波纹总时长（和 CSS 对齐）
const LEAD_MS   = 140;     // “先出波纹，再跳转”的提前量
highlightNode(pos.el, RIPPLE_MS);
pingAt(pos.x, pos.y, RIPPLE_MS);

  cursor.style.transform = 'translate(-50%,-50%) scale(.85)';
  setTimeout(()=> cursor.style.transform = 'translate(-50%,-50%) scale(1)', 120);

// 关键：让波纹先出现一点点，再触发页面动作
await new Promise(r => setTimeout(r, LEAD_MS));
 action && action();
}

  let stopFlag=false, loopTimer=null;

async function playOneLoop(){
  stopFlag=false;
  demoX.home();                                  await new Promise(r=>setTimeout(r,400));

  // 1. 首页点击二级：默认即可
  await clickLabel('Attitude & Willingness', () => {
    const n = (DATA.children||[]).find(c=>c.id==='Attitude & Willingness');
    if (n) demoX.deeper(n);
  });                                            await new Promise(r=>setTimeout(r,550));
  if (stopFlag) return;

  // 2. 二级页点击“Attitude”（确保点到子节点，而不是中心）
  await clickLabel('Attitude', () => {
    const n2 = (ctx.state.current?.children||[]).find(c=>c.id==='Attitude');
    if (n2) demoX.deeper(n2);
  }, { exact:true, leafOnly:true });             await new Promise(r=>setTimeout(r,600));
  if (stopFlag) return;

  // 3. 三级页打开 Affective Attitude 的面板（只匹配这个子标签，精确）
  await clickLabel('Affective Attitude',
    ()=> demoX.togglePanelById('Affective Attitude', true),
    { exact:true, leafOnly:true }
  );                                             await new Promise(r=>setTimeout(r,1200));

  // 4. 再次点它收起
  await clickLabel('Affective Attitude',
    ()=> demoX.togglePanelById('Affective Attitude', false),
    { exact:true, leafOnly:true }
  );                                             await new Promise(r=>setTimeout(r,600));

  // 5. 点击“中心 Attitude”返回上一级（关键：中心 + 精确）
  await clickLabel('Attitude', ()=> demoX.back(), { exact:true, centerOnly:true });
                                                  await new Promise(r=>setTimeout(r,550));

  // 6. 点击“中心 Attitude & Willingness”回首页（同样：中心 + 精确）
  await clickLabel('Attitude & Willingness', ()=> demoX.back(), { exact:true, centerOnly:true });
                                                  await new Promise(r=>setTimeout(r,700));
}


  function startLoop(){
    // 把虚拟鼠标初始放在小窗右下角
    const vb = demoSvg.getBoundingClientRect();
    cursor.style.left = (vb.right - 36) + 'px';
    cursor.style.top  = (vb.bottom - 36) + 'px';
    const run = async ()=>{
      await playOneLoop();
      if(!stopFlag) loopTimer = setTimeout(run, 600);
    };
    run();
  }
  function stopLoop(){
    stopFlag = true;
    if (loopTimer) clearTimeout(loopTimer);
    loopTimer = null;
  }

  // 进页是否显示弹窗
  function show(){ overlay.style.display='flex'; document.body.classList.add('no-scroll'); }
  function hide(){ overlay.style.display='none'; document.body.classList.remove('no-scroll'); }
  if (localStorage.getItem(KEY)==='1') { hide(); }
  else { show(); startLoop(); }

  startBtn.addEventListener('click', ()=>{
    if (dontShow.checked) localStorage.setItem(KEY,'1');
    stopLoop(); hide();
  });

  // 关闭弹窗时顺便清空 demo 上下文的延时器
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay){ stopLoop(); hide(); }});
  document.addEventListener('keydown', (e)=>{ if((e.key==='Escape'||e.key==='Esc') && overlay.style.display!=='none'){ stopLoop(); hide(); }});

  // 窗口大小变化时，重绘小窗
  window.addEventListener('resize', ()=> demoX.drawInPlace());
})();
</script>
